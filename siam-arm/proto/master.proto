syntax = "proto3";
package proto;
option go_package = "./proto";

// บริการหลักที่ Master จะเปิดให้ Worker เรียกใช้
service MasterControl {
  // Worker ส่งข้อมูลรายงานตัว (Heartbeat) - Unary RPC
  rpc ReportStatus (NodeStatus) returns (Ack) {}
  
  // Worker ร้องขอ Configuration ล่าสุด - Unary RPC
  rpc GetConfig (NodeIdentity) returns (ConfigResponse) {}

  // Worker คอยฟังคำสั่งจาก Master - Server Streaming RPC
  rpc GetCommand (NodeStatus) returns (stream Command) {}

  rpc ManageContainer (ContainerAction) returns (Ack);

  // 🤖 เพิ่ม RPC ให้ Worker ส่งผลลัพธ์คำสั่งเชลล์กลับมา
  rpc ReportCommandResult (CommandResult) returns (Ack) {}
}

// ข้อความข้อมูลสถานะ
message NodeStatus {
  string node_id = 1;
  float cpu_usage = 2;
  float ram_usage = 3;
  string status = 4;
  string vessel_type = 5;
  string ip_address = 6;
  string os_info = 7;
  string system_spec = 8;
  repeated string tools = 9;
  string role = 10;
  string department = 11;
  string org_id = 12;
}

// ข้อความการตอบรับ
message Ack {
  bool success = 1;
  string message = 2;
}

message ContainerAction {
    string node_id = 1;
    string action = 2; // เช่น "restart", "pull"
    string container_name = 3;
}

// ข้อความระบุตัวตนของ Worker
message NodeIdentity {
  string node_id = 1;
  string secret_key = 2;
}

// ข้อความ Configuration ที่ส่งกลับไปให้ Worker
message ConfigResponse {
  string api_key = 1;
  string proxy_rules = 2;
}

// ข้อความคำสั่งที่จะส่งให้ Worker
message Command {
  string command_id = 1; // รหัสอ้างอิงของงานที่สั่ง
  string type = 2;       // ประเภทงาน เช่น "shell", "restart"
  string payload = 3;    // เนื้อหางาน เช่น `ls -al` หรือ `ps aux`
}

// 🤖 ข้อความส่งกลับจาก Worker หลังทำคำสั่งสำเร็จ/ล้มเหลว
message CommandResult {
  string command_id = 1;
  string node_id = 2;
  bool success = 3;
  string output = 4; // ผลลัพธ์ stdout หรือ stderr
}