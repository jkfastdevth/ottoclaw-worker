<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siam-Synapse | Web Installer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a202c, #0f172a);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .neon-border {
            border: 1px solid #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }
        .terminal {
            font-family: 'Fira Code', monospace;
            background: #000;
            border-radius: 8px;
            padding: 1rem;
            height: 300px;
            overflow-y: auto;
            font-size: 0.875rem;
            border: 1px solid #334155;
        }
        .terminal-line { margin-bottom: 2px; }
        .terminal-info { color: #10b981; }
        .terminal-error { color: #ef4444; }
        .terminal-warn { color: #f59e0b; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        input {
            background: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid #334155 !important;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2) !important;
            outline: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center font-bold text-xl text-slate-900 shadow-lg shadow-emerald-500/20">🦞</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Siam-Synapse</h1>
                    <p class="text-emerald-400 text-sm font-medium uppercase tracking-widest">Worker Node Setup</p>
                </div>
            </div>
            <div class="hidden md:block text-right">
                <p class="text-slate-400 text-xs">VIRTUAL OFFICE NETWORK</p>
                <p class="text-slate-500 text-[10px]">BUILD 2026.03.12</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Side: Form -->
            <div class="lg:col-span-12">
                <div class="glass p-6 md:p-8 rounded-2xl">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-2 h-6 bg-emerald-500 rounded-full"></div>
                        <h2 class="text-xl font-semibold">Node Configuration</h2>
                    </div>

                    <form id="installForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-slate-400 text-emerald-400 text-xs uppercase tracking-wider">AGENT_NAME</label>
                            <input type="text" id="AGENT_NAME" placeholder="e.g. Kaidos" class="w-full px-4 py-3 rounded-xl text-white">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-slate-400 text-emerald-400 text-xs uppercase tracking-wider">ORCHESTRATOR_NICKNAMES</label>
                            <input type="text" id="ORCHESTRATOR_NICKNAMES" placeholder="e.g. Kaidos, K" class="w-full px-4 py-3 rounded-xl text-white">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-slate-400 text-emerald-400 text-xs uppercase tracking-wider">MASTER_HOST</label>
                            <input type="text" id="MASTER_HOST" placeholder="192.168.1.100" class="w-full px-4 py-3 rounded-xl text-white">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-slate-400 text-emerald-400 text-xs uppercase tracking-wider">MASTER_API_KEY</label>
                            <input type="password" id="MASTER_API_KEY" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl text-white">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-slate-400 text-emerald-400 text-xs uppercase tracking-wider">NODE_SECRET</label>
                            <input type="password" id="NODE_SECRET" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl text-white">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-slate-400 text-emerald-400 text-xs uppercase tracking-wider">TELEGRAM_TOKEN (Optional)</label>
                            <input type="password" id="WORKER_TELEGRAM_TOKEN" placeholder="Bot Token" class="w-full px-4 py-3 rounded-xl text-white">
                        </div>

                        <div class="md:col-span-2 border-t border-slate-700/50 pt-6 mt-2">
                            <div class="flex items-center gap-2 mb-4">
                                <span class="text-sm font-bold text-emerald-400 uppercase tracking-widest">Google Skill Access (Optional)</span>
                                <span class="text-[10px] text-slate-500 italic">— Leave blank for General Worker</span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="block text-sm font-medium text-slate-400 text-emerald-400 text-xs uppercase tracking-wider">GOOGLE_EMAIL</label>
                                    <input type="email" id="GOOGLE_EMAIL" placeholder="user@gmail.com" class="w-full px-4 py-3 rounded-xl text-white">
                                </div>
                                <div class="space-y-2">
                                    <label class="block text-sm font-medium text-slate-400 text-emerald-400 text-xs uppercase tracking-wider">GOOGLE_APP_PASSWORD</label>
                                    <input type="password" id="GOOGLE_APP_PASSWORD" placeholder="16-character app password" class="w-full px-4 py-3 rounded-xl text-white">
                                </div>
                            </div>
                        </div>

                        <div class="md:col-span-2 pt-4">
                            <button type="submit" id="submitBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-4 rounded-xl transition-all shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
                                INITIALIZE NATIVE INSTALLATION
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Bottom: Terminal -->
            <div class="lg:col-span-12">
                <div class="glass p-6 rounded-2xl">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-6 bg-slate-500 rounded-full"></div>
                            <h2 class="text-lg font-semibold text-slate-300">Deployment Console</h2>
                        </div>
                        <div id="statusBadge" class="px-3 py-1 bg-slate-800 rounded-full text-[10px] font-bold text-slate-500 border border-slate-700 uppercase tracking-widest">
                            Ready
                        </div>
                    </div>
                    <div id="terminal" class="terminal border-slate-800/50">
                        <div class="terminal-line text-slate-500">Waiting for initialization...</div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-500 text-sm">
            <p>&copy; 2026 Siam-Synapse Foundation. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const form = document.getElementById('installForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusBadge = document.getElementById('statusBadge');

        function log(msg) {
            const line = document.createElement('div');
            line.className = 'terminal-line';
            
            if (msg.includes('[INFO]')) line.classList.add('terminal-info');
            else if (msg.includes('[ERROR]')) line.classList.add('terminal-error');
            else if (msg.includes('[SUCCESS]')) line.classList.add('terminal-info', 'font-bold');
            else if (msg.includes('[WARN]')) line.classList.add('terminal-warn');
            
            line.textContent = `> ${msg}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Fetch initial config
        fetch('/api/config')
            .then(res => res.json())
            .then(data => {
                for (const key in data) {
                    const el = document.getElementById(key);
                    if (el) el.value = data[key];
                }
                log('[INFO] Loaded existing configuration');
            });

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const config = {
                AGENT_NAME: document.getElementById('AGENT_NAME').value,
                ORCHESTRATOR_NICKNAMES: document.getElementById('ORCHESTRATOR_NICKNAMES').value,
                MASTER_HOST: document.getElementById('MASTER_HOST').value,
                MASTER_API_KEY: document.getElementById('MASTER_API_KEY').value,
                NODE_SECRET: document.getElementById('NODE_SECRET').value,
                WORKER_TELEGRAM_TOKEN: document.getElementById('WORKER_TELEGRAM_TOKEN').value,
                GOOGLE_EMAIL: document.getElementById('GOOGLE_EMAIL').value,
                GOOGLE_APP_PASSWORD: document.getElementById('GOOGLE_APP_PASSWORD').value,
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'DEPLOYING...';
            submitBtn.classList.remove('bg-emerald-500');
            submitBtn.classList.add('bg-slate-700', 'text-slate-400');
            statusBadge.textContent = 'Installing';
            statusBadge.classList.replace('text-slate-500', 'text-emerald-400');
            statusBadge.classList.replace('bg-slate-800', 'bg-emerald-500/10');
            statusBadge.classList.replace('border-slate-700', 'border-emerald-500/30');

            log('[INFO] Sending configuration to server...');
            
            const res = await fetch('/api/install', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });

            if (res.ok) {
                // Start SSE
                const ev = new EventSource('/api/logs');
                ev.onmessage = (e) => {
                    log(e.data);
                };
                ev.addEventListener('end', () => {
                    ev.close();
                    statusBadge.textContent = 'Complete';
                    submitBtn.textContent = 'INSTALLATION FINISHED';
                });
            } else {
                const err = await res.text();
                log(`[ERROR] ${err}`);
                submitBtn.disabled = false;
                submitBtn.textContent = 'RETRY INSTALLATION';
            }
        };
    </script>
</body>
</html>
